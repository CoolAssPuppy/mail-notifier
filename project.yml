name: MailNotifier
options:
  bundleIdPrefix: com.strategicnerds
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

packages:
  GoogleAPIClientForREST:
    url: https://github.com/google/google-api-objectivec-client-for-rest
    from: "2.0.0"
  GTMAppAuth:
    url: https://github.com/google/GTMAppAuth
    from: "1.0.0"
  AppAuth:
    url: https://github.com/openid/AppAuth-iOS
    from: "1.4.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "1.0.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_APP_SANDBOX: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 955GSY56UT
  configs:
    Debug:
      # Hardened runtime breaks XCTest's runtime injection into the host app.
      ENABLE_HARDENED_RUNTIME: NO
      # Xcode 15+ mergeable libraries split the host into "Mail Notifier" +
      # "Mail Notifier.debug.dylib" in Debug, but the test bundle's rpath
      # doesn't reach the host's MacOS directory so dlopen fails with
      # "Library not loaded: @rpath/Mail Notifier.debug.dylib". Force a
      # statically merged Debug binary so xcodebuild test works.
      MERGED_BINARY_TYPE: manual
      MERGEABLE_LIBRARY: NO
    Release:
      ENABLE_HARDENED_RUNTIME: YES

targets:
  MailNotifier:
    type: application
    platform: macOS
    scheme:
      testTargets:
        - MailNotifierTests
      gatherCoverageData: true
    sources:
      - path: Source
      - path: Images.xcassets
      - path: Resources
        excludes:
          - Sounds
      - path: Resources/Sounds
        type: folder
    dependencies:
      - package: GoogleAPIClientForREST
        product: GoogleAPIClientForREST_Gmail
      - package: GTMAppAuth
      - package: AppAuth
      - package: KeyboardShortcuts
      - package: KeychainAccess
      - package: Sparkle
      - package: PostHog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.strategicnerds.MailNotifierApp
        PRODUCT_NAME: "Mail Notifier"
        MARKETING_VERSION: "3.3.0"
        CURRENT_PROJECT_VERSION: "20"
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: MailNotifier.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LS_MINIMUM_SYSTEM_VERSION: "14.0"
        COMBINE_HIDPI_IMAGES: YES
  MailNotifierTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: MailNotifier
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Mail Notifier.app/Contents/MacOS/Mail Notifier"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.strategicnerds.MailNotifierTests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        # Hardened runtime breaks XCTest's runtime injection into the host
        # app during `xcodebuild test`. Disable for the test bundle only.
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Automatic
